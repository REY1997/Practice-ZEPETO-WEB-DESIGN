<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEPETO 이벤트 페이지 빌더</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    /* ── Design Tokens ───────────────────────────────── */
    :root {
      --color-gray-84       : #292930;
      --color-gray-64       : #5C5C61;
      --color-gray-54       : #75757A;
      --color-gray-40       : #99999C;
      --color-gray-12       : #E0E0E1;
      --color-white-100     : #FFFFFF;
      --color-bg-offwhite-01: #F5F5F6;
      --color-primary       : #5C46FF;
      --font-family-display : "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-family-text    : "SF Pro Text",    -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family-text); background: #EBEBED; min-height: 100vh; }

    /* ── Layout ──────────────────────────────────────── */
    .builder { display: flex; gap: 32px; padding: 32px; align-items: flex-start; }

    /* ── Preview (왼쪽) ──────────────────────────────── */
    .preview-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .preview-badge { font-size: 12px; color: var(--color-gray-54); margin-bottom: 14px; }
    .phone-frame {
      width: 375px; background: var(--color-white-100);
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 8px 48px rgba(0,0,0,0.14);

    /* ── Panel (오른쪽) ──────────────────────────────── */
    .panel { width: 280px; flex-shrink: 0; position: sticky; top: 32px; display: flex; flex-direction: column; gap: 8px; }
    .panel__header {
      font-family: var(--font-family-display);
      font-size: 13px; font-weight: 700; color: var(--color-gray-54);
      text-transform: uppercase; letter-spacing: 0.06em; padding: 0 4px 8px;

    /* 섹션 카드 */
    .ctrl-card { background: var(--color-white-100); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.07); }
    .ctrl-card__head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; cursor: pointer; user-select: none;

    .ctrl-card__head:hover { background: #fafafa; }
    .ctrl-card__label { font-size: 13px; font-weight: 700; color: var(--color-gray-84); }
    .ctrl-card__badge { font-size: 10px; color: var(--color-gray-40); font-weight: 500; }
    .ctrl-card__chevron { color: var(--color-gray-40); font-size: 11px; transition: transform 0.2s; }

    .ctrl-card__body { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 18px; }
    .ctrl-card__divider { height: 1px; background: var(--color-gray-12); margin: 0 16px; }

    .ctrl-group__label {
      font-size: 11px; font-weight: 600; color: var(--color-gray-54);
      margin-bottom: 10px; letter-spacing: 0.03em;

    /* ── 이미지 업로드 ───────────────────────────────── */
    .upload-zone {
      border: 1.5px dashed var(--color-gray-12); border-radius: 10px;
      padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.15s;

    .upload-zone:hover { border-color: var(--color-primary); }
    .upload-zone__thumb { width: 100%; height: 64px; object-fit: cover; border-radius: 6px; }
    .upload-zone__hint { font-size: 11px; color: var(--color-gray-40); margin-top: 7px; line-height: 1.5; }
    .upload-zone input[type=file] { display: none; }
    .upload-reset { display: inline-block; margin-top: 8px; font-size: 11px; color: var(--color-primary); cursor: pointer; text-decoration: underline; }

    /* ── Color Picker (Figma 스타일) ─────────────────── */
    .cp { display: flex; flex-direction: column; gap: 10px; }

    /* 2D 팔레트 */
    .cp-palette {
      position: relative; width: 100%; height: 120px;
      border-radius: 6px; cursor: crosshair; overflow: hidden; flex-shrink: 0;
    }
    .cp-palette__sat  { position: absolute; inset: 0; }
    .cp-palette__dark { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, #000); }
    .cp-palette__thumb {
      position: absolute; width: 12px; height: 12px;
      border-radius: 50%; border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 1px 4px rgba(0,0,0,0.3);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Hue 슬라이더 */
    .cp-hue-wrap { position: relative; height: 12px; border-radius: 6px; overflow: hidden; }
    .cp-hue-track {
      position: absolute; inset: 0;
      background: linear-gradient(to right,
        hsl(0,100%,50%), hsl(30,100%,50%), hsl(60,100%,50%), hsl(90,100%,50%),
        hsl(120,100%,50%), hsl(150,100%,50%), hsl(180,100%,50%), hsl(210,100%,50%),
        hsl(240,100%,50%), hsl(270,100%,50%), hsl(300,100%,50%), hsl(330,100%,50%), hsl(360,100%,50%));
    }
    .cp-hue-input {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; margin: 0;
      -webkit-appearance: none; appearance: none;
    }
    .cp-hue-thumb-overlay {
      position: absolute; top: 0; bottom: 0;
      width: 14px; height: 14px; top: -1px;
      border-radius: 50%; border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.25);
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* Hex 입력 */
    .cp-bottom { display: flex; align-items: center; gap: 8px; }
    .cp-preview { width: 28px; height: 28px; border-radius: 5px; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
    .cp-hex-wrap {
      flex: 1; display: flex; align-items: center;
      border: 1px solid var(--color-gray-12); border-radius: 6px;
      padding: 0 8px; height: 28px; background: var(--color-bg-offwhite-01);
    }
    .cp-hex-label { font-size: 10px; color: var(--color-gray-40); font-family: monospace; margin-right: 4px; }
    .cp-hex-input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 12px; font-family: monospace; color: var(--color-gray-84);
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* ── Components ──────────────────────────────────── */
    .nav-bar { height: 52px; display: flex; align-items: center; padding: 0 20px; background: var(--color-white-100); border-bottom: 1px solid var(--color-gray-12); }
    .nav-bar__back { font-size: 17px; color: var(--color-primary); }

    .hero { width: 375px; height: 248px; position: relative; overflow: hidden; background: var(--color-gray-84); }
    .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero__empty {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #292930 0%, #47474D 100%);
      color: rgba(255,255,255,0.3); font-size: 12px; gap: 8px;
    }
    .hero__title {
      position: absolute; bottom: 16px; left: 20px;
      color: var(--color-white-100);
      font-family: var(--font-family-display);
      font-size: 23px; font-weight: 700; line-height: 32px;
      text-shadow: 0 0 6.25px rgba(0,0,0,0.3); pointer-events: none;
    }

    .tabs { display: flex; padding: 0 20px; background: var(--color-white-100); border-bottom: 1px solid var(--color-gray-12); }
    .tab { padding: 12px 16px 10px; font-size: 15px; color: var(--color-gray-40); font-weight: 500; border-bottom: 2px solid transparent; cursor: pointer; user-select: none; }
    .tab.is-active { color: var(--color-gray-84); font-weight: 700; border-bottom-color: var(--color-gray-84); }

    .section-wrap { background: var(--color-white-100); padding: 0 16px 24px; }
    .section-title { font-family: var(--font-family-display); font-size: 20px; font-weight: 700; color: var(--color-gray-84); line-height: 28px; padding: 6px 0 8px; }
    .section-inner { padding: 24px 20px; border-radius: 20px; }

    .step-list { display: flex; flex-direction: column; }
    .step-item { display: flex; gap: 10px; align-items: flex-start; }
    .step-timeline { display: flex; flex-direction: column; align-items: center; align-self: stretch; flex-shrink: 0; width: 8px; }
    .step-bullet { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .step-line { flex: 1; width: 1px; min-height: 8px; }
    .step-content { flex: 1; padding-bottom: 20px; }
    .step-item:last-child .step-content { padding-bottom: 0; }
    .step-label { font-family: var(--font-family-text); font-size: 15px; font-weight: 700; line-height: 20px; }
    .step-desc { font-family: var(--font-family-text); font-size: 15px; font-weight: 500; color: var(--color-gray-84); line-height: 20px; margin-top: 2px; }

    .tip-list { display: flex; flex-direction: column; gap: 6px; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.08); }
    .tip-item { display: flex; flex-direction: column; gap: 6px; }
    .tip-tag { display: inline-flex; align-items: center; height: 20px; padding: 4px 10px 3px; border-radius: 4px; background: #ff58a4; font-family: var(--font-family-text); font-size: 11px; font-weight: 700; color: var(--color-white-100); align-self: flex-start; }
    .tip-text { font-family: var(--font-family-text); font-size: 15px; font-weight: 500; color: var(--color-gray-84); line-height: 20px; }

    .reward-list { display: flex; flex-direction: column; gap: 14px; }
    .reward-item { display: flex; align-items: center; gap: 12px; }
    .reward-rank { font-size: 14px; font-weight: 700; color: var(--color-gray-84); width: 36px; }
    .reward-info { flex: 1; }
    .reward-name { font-size: 14px; font-weight: 600; color: var(--color-gray-84); }
    .reward-sub { font-size: 12px; color: var(--color-gray-54); margin-top: 2px; }
    .reward-img { width: 48px; height: 48px; border-radius: 10px; background: rgba(0,0,0,0.08); flex-shrink: 0; }

    .period-list { display: flex; flex-direction: column; }
    .period-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .period-item:last-child { border-bottom: none; }
    .period-label { font-size: 13px; color: var(--color-gray-54); }
    .period-value { font-size: 13px; font-weight: 600; color: var(--color-gray-84); }

    .disclaimer { background: var(--color-bg-offwhite-01); padding: 24px 16px 64px; }
    .disclaimer__title { font-size: 15px; font-weight: 700; color: var(--color-gray-54); margin-bottom: 12px; }
    .disclaimer__list { display: flex; flex-direction: column; gap: 10px; }
    .disclaimer__item { display: flex; gap: 6px; }
    .disclaimer__bullet { font-size: 10px; color: var(--color-gray-54); line-height: 18px; flex-shrink: 0; }
    .disclaimer__text { font-size: 13px; color: var(--color-gray-54); line-height: 18px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

/* ── 색상 변환 유틸 ──────────────────────────────────── */
function hsvToHex(h, s, v) {
  s /= 100; v /= 100;
  const f = (n, k = (n + h / 60) % 6) =>
    v - v * s * Math.max(Math.min(k, 4 - k, 1), 0);
  return '#' + [f(5), f(3), f(1)]
    .map(x => Math.round(x * 255).toString(16).padStart(2, '0')).join('');
}

function hexToHsv(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  let h = 0;
  if (d) {
    if (max === r) h = ((g - b) / d + 6) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
  }
  return { h: Math.round(h), s: max ? Math.round((d / max) * 100) : 0, v: Math.round(max * 100) };
}

function isValidHex(hex) { return /^#[0-9a-fA-F]{6}$/.test(hex); }

/* ── ColorPicker 컴포넌트 ────────────────────────────── */
function ColorPicker({ hex, onChange }) {
  const { h, s, v } = hexToHsv(hex);
  const paletteRef = useRef();
  const isDragging = useRef(false);
  const [hexInput, setHexInput] = useState(hex.slice(1).toUpperCase());

  useEffect(() => { setHexInput(hex.slice(1).toUpperCase()); }, [hex]);

  const pureHueHex = hsvToHex(h, 100, 100);

  /* 2D 팔레트에서 위치 → S, V 계산 */
  const pickFromPalette = useCallback((e) => {
    const el = paletteRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const nx = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const ny = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    const newS = Math.round(nx * 100);
    const newV = Math.round((1 - ny) * 100);
    onChange(hsvToHex(h, newS, newV));
  }, [h, onChange]);

  const onPaletteDown = (e) => { isDragging.current = true; pickFromPalette(e); };
  const onPaletteMove = (e) => { if (isDragging.current) pickFromPalette(e); };
  const onPaletteUp   = () => { isDragging.current = false; };

  /* Hue 슬라이더 */
  const onHueChange = (e) => {
    const newH = +e.target.value;
    onChange(hsvToHex(newH, s, v));
  };

  /* Hex 입력 */
  const onHexInput = (e) => {
    const val = e.target.value.replace(/[^0-9a-fA-F]/g, '').slice(0, 6).toUpperCase();
    setHexInput(val);
    if (val.length === 6 && isValidHex('#' + val)) onChange('#' + val);
  };

  /* thumb 위치 */
  const thumbX = `${s}%`;
  const thumbY = `${100 - v}%`;
  const hueThumbX = `calc(${(h / 360) * 100}% )`;

  return (
    <div className="cp">
      {/* 2D 팔레트 */}
      <div
        className="cp-palette"
        ref={paletteRef}
        onMouseDown={onPaletteDown}
        onMouseMove={onPaletteMove}
        onMouseUp={onPaletteUp}
        onMouseLeave={onPaletteUp}
        onTouchStart={onPaletteDown}
        onTouchMove={onPaletteMove}
        onTouchEnd={onPaletteUp}
      >
        <div className="cp-palette__sat" style={{background: `linear-gradient(to right, #fff, ${pureHueHex})`}} />
        <div className="cp-palette__dark" />
        <div className="cp-palette__thumb" style={{left: thumbX, top: thumbY, background: hex}} />
      </div>

      {/* Hue 슬라이더 */}
      <div className="cp-hue-wrap">
        <div className="cp-hue-track" />
        <input className="cp-hue-input" type="range" min="0" max="360" value={h} onChange={onHueChange} />
        <div className="cp-hue-thumb-overlay" style={{left: hueThumbX, background: pureHueHex}} />
      </div>

      {/* Hex 입력 + 프리뷰 */}
      <div className="cp-bottom">
        <div className="cp-preview" style={{background: hex}} />
        <div className="cp-hex-wrap">
          <span className="cp-hex-label">Hex</span>
          <input
            className="cp-hex-input"
            value={hexInput}
            onChange={onHexInput}
            onBlur={() => setHexInput(hex.slice(1).toUpperCase())}
            maxLength={6}
          />
        </div>
      </div>
    </div>
  );
}

/* ── 아코디언 카드 ───────────────────────────────────── */
function CtrlCard({ label, badge, defaultOpen = true, children }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="ctrl-card">
      <div className="ctrl-card__head" onClick={() => setOpen(o => !o)}>
        <div>
          <span className="ctrl-card__label">{label}</span>
          {badge && <span className="ctrl-card__badge"> · {badge}</span>}
        </div>
        <span className={`ctrl-card__chevron ${open ? 'open' : ''}`}>▼</span>
      </div>
      {open && (<>
        <div className="ctrl-card__divider" />
        <div className="ctrl-card__body">{children}</div>
      </>)}
    </div>
  );
}

/* ── 샘플 데이터 ─────────────────────────────────────── */
const STEPS = [
  { label: 'STEP 1', desc: 'Shop your Iconic Look\nat the Gym Girl Shop' },
  { label: 'STEP 2', desc: 'Tap the "Join Event" button\non the event page' },
  { label: 'STEP 3', desc: 'Share with friends\nfor bonus rewards' },
];
const TIPS   = [{ text: "샵 '핑크파워' 탭에서 아이템 구매 시,\n당첨 확률 2배로 UP!" }];
const REWARDS = [
  { rank: '🥇 1위', name: 'ZEM 10,000', sub: '1명' },
  { rank: '🥈 2위', name: 'ZEM 5,000',  sub: '3명' },
  { rank: '🥉 3위', name: 'ZEM 2,000',  sub: '10명' },
];
const PERIODS = [
  { label: '이벤트 기간', value: '2025.02.06 – 02.28' },
  { label: '당첨자 발표', value: '2025.03.07' },
  { label: '리워드 지급', value: '발표 후 7일 이내' },
];
const DISCLAIMERS = [
  '하루 1회만 참여할 수 있습니다.',
  '당첨자 발표는 공식 ZEPETO 채널을 통해 안내됩니다.',
  '리워드는 참여한 ZEPETO 계정으로 지급됩니다.',
  '부정 행위가 적발될 경우 당첨이 취소될 수 있습니다.',
];

/* ── App ─────────────────────────────────────────────── */
function App() {
  const [heroImg,   setHeroImg]  = useState(null);
  const [tab,       setTab]      = useState(0);
  const [sectionBg, setSectionBg] = useState('#fff4e9'); /* 이벤트 전용 색상 - 토큰 없음 */
  const [stepColor, setStepColor] = useState('#714113'); /* 이벤트 전용 색상 - 토큰 없음 */
  const fileRef = useRef();

  /* step 세로선은 stepColor를 옅게 */
  const stepLineColor = (() => {
    const { h, s, v } = hexToHsv(stepColor);
    return hsvToHex(h, Math.max(s - 30, 10), Math.min(v + 40, 95));
  })();

  const onFile = e => {
    const f = e.target.files[0];
    if (f) setHeroImg(URL.createObjectURL(f));
    e.target.value = '';
  };

  return (
    <div className="builder">

      {/* ── 왼쪽: 모바일 미리보기 ───────────────────── */}
      <div className="preview-wrap">
        <div className="preview-badge">모바일 미리보기 · 375px</div>
        <div className="phone-frame">
          <div className="nav-bar"><span className="nav-bar__back">‹ Back</span></div>

          {/* EventHero */}
          <div className="hero">
            {heroImg
              ? <img src={heroImg} alt="hero" />
              : <div className="hero__empty">
                  <svg width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                  </svg>
                  이미지를 업로드하세요
                </div>
            }
            <div className="hero__title">세상에서 가장 핫한<br/>핑크룩을 완성하자!</div>
          </div>

          {/* TabSection */}
          <div className="tabs">
            {['Event', 'Item'].map((t, i) => (
              <div key={i} className={`tab ${tab===i?'is-active':''}`} onClick={()=>setTab(i)}>{t}</div>
            ))}
          </div>

          {/* ParticipationSection */}
          <div className="section-wrap">
            <div className="section-title">참가 방법</div>
            <div className="section-inner" style={{background: sectionBg}}>
              <div className="step-list">
                {STEPS.map((s, i) => (
                  <div className="step-item" key={i}>
                    <div className="step-timeline">
                      <div className="step-bullet" style={{background: stepColor}} />
                      {i < STEPS.length-1 && <div className="step-line" style={{background: stepLineColor}} />}
                    </div>
                    <div className="step-content">
                      <div className="step-label" style={{color: stepColor}}>{s.label}</div>
                      <div className="step-desc">{s.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="tip-list">
                {TIPS.map((tip, i) => (
                  <div className="tip-item" key={i}>
                    <span className="tip-tag">TIP!</span>
                    <span className="tip-text">{tip.text}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* RewardSection */}
          <div className="section-wrap">
            <div className="section-title">리워드</div>
            <div className="section-inner" style={{background: sectionBg}}>
              <div className="reward-list">
                {REWARDS.map((r, i) => (
                  <div className="reward-item" key={i}>
                    <div className="reward-rank">{r.rank}</div>
                    <div className="reward-info">
                      <div className="reward-name">{r.name}</div>
                      <div className="reward-sub">{r.sub}</div>
                    </div>
                    <div className="reward-img" />
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* PeriodSection */}
          <div className="section-wrap">
            <div className="section-title">이벤트 기간</div>
            <div className="section-inner" style={{background: sectionBg}}>
              <div className="period-list">
                {PERIODS.map((p, i) => (
                  <div className="period-item" key={i}>
                    <span className="period-label">{p.label}</span>
                    <span className="period-value">{p.value}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* DisclaimerSection */}
          <div className="disclaimer">
            <div className="disclaimer__title">Disclaimers</div>
            <div className="disclaimer__list">
              {DISCLAIMERS.map((d, i) => (
                <div className="disclaimer__item" key={i}>
                  <span className="disclaimer__bullet">•</span>
                  <span className="disclaimer__text">{d}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── 오른쪽: 컨트롤 패널 ─────────────────────── */}
      <div className="panel">
        <div className="panel__header">편집 패널</div>

        <CtrlCard label="EventHero" badge="배경 이미지">
          <div>
            <div className="ctrl-group__label">배경 이미지</div>
            <div className="upload-zone" onClick={() => fileRef.current.click()}>
              {heroImg
                ? <img className="upload-zone__thumb" src={heroImg} alt="preview" />
                : <>
                    <svg width="24" height="24" fill="none" stroke="#C7C7C9" strokeWidth="1.5" viewBox="0 0 24 24">
                      <rect x="3" y="3" width="18" height="18" rx="2"/>
                      <circle cx="8.5" cy="8.5" r="1.5"/>
                      <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <div className="upload-zone__hint">클릭해서 업로드<br/>JPG · PNG · WebP</div>
                  </>
              }
              <input ref={fileRef} type="file" accept="image/*" onChange={onFile} />
            </div>
            {heroImg && <span className="upload-reset" onClick={()=>setHeroImg(null)}>이미지 제거</span>}
          </div>
        </CtrlCard>

        <CtrlCard label="ParticipationSection" badge="배경색 · STEP 컬러">
          <div>
            <div className="ctrl-group__label">섹션 배경 컬러</div>
            <ColorPicker hex={sectionBg} onChange={setSectionBg} />
          </div>
          <div>
            <div className="ctrl-group__label">STEP 컬러</div>
            <ColorPicker hex={stepColor} onChange={setStepColor} />
          </div>
        </CtrlCard>

        <CtrlCard label="RewardSection" badge="배경색 공유">
          <div>
            <div className="ctrl-group__label">섹션 배경 컬러 (공유)</div>
            <ColorPicker hex={sectionBg} onChange={setSectionBg} />
          </div>
        </CtrlCard>

        <CtrlCard label="PeriodSection" badge="배경색 공유" defaultOpen={false}>
          <div>
            <div className="ctrl-group__label">섹션 배경 컬러 (공유)</div>
            <ColorPicker hex={sectionBg} onChange={setSectionBg} />
          </div>
        </CtrlCard>

        <CtrlCard label="DisclaimerSection" badge="고정" defaultOpen={false}>
          <div style={{fontSize:'12px', color:'var(--color-gray-40)', lineHeight:'1.6'}}>
            배경색은 디자인 시스템 토큰<br/>
            <code style={{fontFamily:'monospace', fontSize:'11px'}}>--color-bg-offwhite-01</code>로 고정됩니다.
          </div>
        </CtrlCard>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
